<style>
  :root {
    --bg: #08090d;
    --bg-card: rgba(255,255,255,0.03);
    --bg-card-hover: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --text: #e6e8ec;
    --text-dim: rgba(230,232,236,0.62);
    --text-mute: rgba(230,232,236,0.38);
    --accent-purple: #a78bfa;
    --accent-cyan: #22d3ee;
    --accent-green: #34d399;
    --accent-amber: #fbbf24;
    --accent-rose: #fb7185;
    --accent-brass: #d4af78;
    --grad-primary: linear-gradient(120deg, var(--accent-purple), var(--accent-cyan));
  }
  * { box-sizing: border-box; }
  html { font-size: 18px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    margin: 0;
    line-height: 1.6;
    font-feature-settings: 'tnum', 'cv11';
    -webkit-font-smoothing: antialiased;
  }
  .ambient-orb {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  .ambient-orb.one { top: -200px; left: -200px; background: var(--accent-purple); }
  .ambient-orb.two { bottom: -200px; right: -200px; background: var(--accent-cyan); }
  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 4rem 2rem 6rem;
  }

  /* ---------- Hero ---------- */
  .hero {
    text-align: left;
    margin-bottom: 3rem;
  }
  .hero .eyebrow {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-mute);
    margin-bottom: 1.25rem;
  }
  .hero h1 {
    font-size: clamp(2.75rem, 6vw, 4.75rem);
    font-weight: 900;
    letter-spacing: -0.025em;
    line-height: 1.05;
    margin: 0 0 0.75rem;
    background: linear-gradient(120deg, #ffffff 0%, var(--accent-purple) 50%, var(--accent-cyan) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero .meta {
    font-size: 0.95rem;
    color: var(--text-mute);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }

  /* ---------- The Answer + split scores ---------- */
  .answer-card {
    background: linear-gradient(135deg, rgba(167,139,250,0.08), rgba(34,211,238,0.05));
    border: 1px solid rgba(167,139,250,0.25);
    border-radius: 20px;
    padding: 2.5rem 2.5rem 2rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }
  .answer-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 4px;
    height: 100%;
    background: var(--grad-primary);
  }
  .answer-card .label {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent-cyan);
    margin-bottom: 0.75rem;
  }
  blockquote.answer {
    font-size: clamp(1.25rem, 2.2vw, 1.6rem);
    font-weight: 600;
    line-height: 1.4;
    margin: 0;
    color: var(--text);
  }
  .score-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1.5fr;
    gap: 1.5rem;
    align-items: end;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }
  @media (max-width: 720px) {
    .score-row { grid-template-columns: 1fr; gap: 1rem; }
  }
  .score-cell .label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-mute);
    margin-bottom: 0.4rem;
  }
  .score-cell .value {
    font-size: 2.5rem;
    font-weight: 900;
    line-height: 1;
    color: var(--text);
    font-feature-settings: 'tnum';
  }
  .score-cell.overall .value {
    background: var(--grad-primary);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 3rem;
  }
  .score-cell .value-suffix {
    color: var(--text-mute);
    font-size: 1.15rem;
    font-weight: 700;
  }
  .score-cell .interpretation {
    font-size: 0.95rem;
    color: var(--text-dim);
    line-height: 1.45;
  }
  .score-bar {
    display: block;
    width: 100%;
    height: 8px;
    margin: 0.6rem 0 0.6rem;
  }
  .score-bar.overall { height: 10px; margin-top: 0.7rem; }
  .score-bar-track {
    fill: rgba(255,255,255,0.06);
  }
  .score-bar-fill {
    /* fill color set inline per cell */
  }

  /* ---------- CTA rows ---------- */
  .cta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.85rem;
    margin: 1.25rem 0 4rem;
  }
  .cta-row.centered { justify-content: center; }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.85rem 1.5rem;
    border-radius: 999px;
    font-weight: 700;
    font-size: 0.95rem;
    text-decoration: none;
    transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }
  .cta.primary {
    background: var(--accent-cyan);
    color: #08090d;
    font-weight: 900;
    border: 1px solid transparent;
  }
  .cta.primary:hover {
    background: var(--grad-primary);
    color: #08090d;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(34,211,238,0.35);
  }
  .cta.ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border-strong);
  }
  .cta.ghost:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
  .cta .icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .cta .arrow { transition: transform 0.2s ease; }
  .cta:hover .arrow { transform: translateX(3px); }

  /* ---------- Lane health banner (v0.8 QA-4) ---------- */
  .lane-health {
    margin: 32px 0 8px 0;
    padding: 24px 28px;
    background: linear-gradient(135deg, rgba(251,113,133,0.08), rgba(251,191,36,0.05));
    border: 1px solid rgba(251,113,133,0.30);
    border-left: 4px solid #fb7185;
    border-radius: 12px;
  }
  .lane-health-eyebrow {
    color: #fb7185;
    font-size: 0.85rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .lane-health-title {
    color: var(--text);
    font-size: 1.5rem;
    font-weight: 800;
    margin: 0 0 8px 0;
  }
  .lane-health-subtitle {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin: 0 0 20px 0;
  }
  .lane-health-rows {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .lane-health-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 16px;
    padding: 12px 16px;
    background: rgba(0,0,0,0.25);
    border-radius: 8px;
    border-left: 3px solid #fb7185;
  }
  .lane-health-row.lane-health-warn {
    border-left-color: #fbbf24;
  }
  .lane-health-status {
    color: #fb7185;
    font-weight: 800;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    align-self: start;
    padding-top: 2px;
  }
  .lane-health-row.lane-health-warn .lane-health-status {
    color: #fbbf24;
  }
  .lane-health-headline {
    color: var(--text);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .lane-health-impact {
    color: var(--text-dim);
    font-size: 0.92rem;
    margin-bottom: 6px;
    line-height: 1.5;
  }
  .lane-health-fix {
    color: var(--text-dim);
    font-size: 0.9rem;
  }
  .lane-health-fix strong { color: var(--text); }
  @media (max-width: 600px) {
    .lane-health-row { grid-template-columns: 1fr; gap: 6px; }
  }

  /* ---------- Vocabulary primer (v0.8 EM-52) ---------- */
  .vocabulary-subtitle {
    color: var(--text-dim);
    font-size: 1rem;
    margin: 0 0 24px 0;
  }
  .vocabulary-primer {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    padding: 28px 32px;
    background: rgba(34,211,238,0.04);
    border: 1px solid rgba(34,211,238,0.14);
    border-radius: 14px;
  }
  .vocabulary-row {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 16px;
    align-items: baseline;
    padding: 4px 0;
  }
  .vocabulary-term {
    font-weight: 800;
    color: var(--accent-cyan);
    letter-spacing: 0.02em;
  }
  .vocabulary-definition {
    color: var(--text);
    line-height: 1.5;
  }
  .vocabulary-kicker {
    color: var(--text-dim);
    font-style: italic;
    margin-top: 16px;
    text-align: center;
    font-size: 0.95rem;
  }
  @media (max-width: 600px) {
    .vocabulary-row { grid-template-columns: 1fr; gap: 4px; }
  }

  /* ---------- Mid-page banner CTA ---------- */
  .banner-cta {
    background: linear-gradient(135deg, rgba(34,211,238,0.07), rgba(167,139,250,0.04));
    border: 1px solid rgba(34,211,238,0.22);
    border-radius: 18px;
    padding: 1.75rem 2rem;
    margin: 1rem 0 4rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 1.25rem;
    align-items: center;
  }
  @media (max-width: 720px) { .banner-cta { grid-template-columns: 1fr; } }
  .banner-cta .copy {
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.45;
  }
  .banner-cta .cta-row { margin: 0; }

  /* ---------- Section headings ---------- */
  h2.section {
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 800;
    letter-spacing: -0.015em;
    margin: 0 0 1.5rem;
  }

  /* ---------- The 3 wins ---------- */
  .wins-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.25rem;
    margin-bottom: 2rem;
  }
  .win {
    background: var(--bg-card);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem 1.5rem;
    position: relative;
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .win:hover {
    transform: translateY(-2px);
    border-color: var(--border-strong);
    background: var(--bg-card-hover);
  }
  .win .rank {
    position: absolute;
    top: 1rem;
    right: 1.25rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.5rem;
    font-weight: 900;
    color: rgba(167,139,250,0.18);
    line-height: 1;
  }
  .win h3 {
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.3;
    margin: 0 0 0.85rem;
    padding-right: 2.5rem;
  }
  .win .one-liner {
    font-size: 0.97rem;
    color: var(--text-dim);
    margin: 0 0 1.25rem;
    line-height: 1.55;
  }
  .win .ai-mechanism {
    font-size: 0.9rem;
    font-style: italic;
    color: var(--accent-cyan);
    margin: 0 0 0.85rem;
    line-height: 1.4;
  }
  .win .ai-mechanism::before {
    content: '→ ';
    color: var(--accent-cyan);
  }
  .win .impact {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--accent-brass);
    padding: 0.4rem 0.7rem;
    border: 1px solid rgba(212,175,120,0.3);
    border-radius: 8px;
    background: rgba(212,175,120,0.06);
  }

  /* ---------- Why now ---------- */
  .why-now {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem 2.25rem;
    margin-bottom: 4rem;
    line-height: 1.65;
    color: var(--text-dim);
    font-size: 1.02rem;
  }
  .why-now strong { color: var(--text); }
  .why-now .split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin: 1rem 0;
    padding: 1rem 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  @media (max-width: 720px) { .why-now .split { grid-template-columns: 1fr; } }
  .why-now .split-item {
    font-size: 0.95rem;
    line-height: 1.5;
    padding-left: 1.25rem;
    position: relative;
  }
  .why-now .split-item::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent-cyan);
    font-weight: 700;
  }

  /* ---------- Losing time ---------- */
  .pain-list { display: flex; flex-direction: column; gap: 1.25rem; margin-bottom: 4rem; }
  .pain-row {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.4rem 1.6rem;
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.55rem;
  }
  .pain-row .pain-headline {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    margin: 0;
    line-height: 1.4;
  }
  .pain-row .pain-detail {
    font-size: 0.95rem;
    color: var(--text-dim);
    margin: 0;
    line-height: 1.55;
  }
  .pain-row .pain-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 1.25rem;
    margin-top: 0.5rem;
    padding-top: 0.85rem;
    border-top: 1px solid var(--border);
    font-size: 0.9rem;
  }
  .pain-row .time-cost {
    color: var(--accent-rose);
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  .pain-row .ai-fix {
    color: var(--accent-cyan);
    font-style: italic;
  }
  .pain-row .hour-bar {
    display: inline-block;
    width: 90px;
    height: 6px;
    vertical-align: middle;
    margin: 0 0.5rem;
  }
  .pain-row .hour-bar-track {
    fill: rgba(255,255,255,0.06);
  }
  .pain-row .hour-bar-fill {
    fill: var(--accent-rose);
  }
  .pain-row .ai-fix::before {
    content: '→ AI fixes this with: ';
    font-style: normal;
    color: var(--text-mute);
    font-weight: 600;
  }

  /* ---------- Roadmap timeline ---------- */
  .roadmap-gantt {
    margin-bottom: 1.25rem;
    padding: 1rem 0.5rem 0;
  }
  .gantt-track {
    display: block;
    width: 100%;
    height: 60px;
    overflow: visible;
  }
  .gantt-segment {
    opacity: 0.85;
    transition: opacity 0.2s ease;
  }
  .gantt-segment:hover { opacity: 1; }
  .gantt-tick {
    fill: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .gantt-title-label {
    fill: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 700;
  }
  .gantt-chevron {
    opacity: 0.6;
  }
  .roadmap-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .roadmap-step {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem 1.4rem;
    position: relative;
  }
  .roadmap-step::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 3px;
    border-radius: 14px 14px 0 0;
  }
  .roadmap-step.green::before { background: var(--accent-green); }
  .roadmap-step.cyan::before { background: var(--accent-cyan); }
  .roadmap-step.purple::before { background: var(--accent-purple); }
  .roadmap-step.brass::before { background: var(--accent-brass); }
  .roadmap-step .window {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-mute);
    margin-bottom: 0.6rem;
  }
  .roadmap-step h3 {
    font-size: 1.15rem;
    font-weight: 800;
    margin: 0 0 0.7rem;
    color: var(--text);
  }
  .roadmap-step .body {
    font-size: 0.92rem;
    color: var(--text-dim);
    line-height: 1.55;
    margin: 0;
  }
  .roadmap-footnote {
    font-size: 0.92rem;
    color: var(--text-mute);
    font-style: italic;
    margin: 0 0 4rem;
    padding: 0 0.5rem;
  }

  /* ---------- Lanes ---------- */
  .lanes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.25rem;
    margin-bottom: 4rem;
  }
  .lane {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.6rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .lane.featured {
    border-color: rgba(167,139,250,0.35);
    background: linear-gradient(135deg, rgba(167,139,250,0.08), rgba(34,211,238,0.04));
  }
  .lane .lane-name {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-mute);
  }
  .lane.featured .lane-name { color: var(--accent-purple); }
  .lane h3 {
    font-size: 1.1rem;
    font-weight: 700;
    margin: 0;
    line-height: 1.35;
  }
  .lane .lane-body {
    font-size: 0.94rem;
    color: var(--text-dim);
    line-height: 1.55;
    margin: 0;
    flex: 1;
  }
  .lane .lane-cta {
    margin-top: 0.5rem;
    align-self: flex-start;
  }

  /* ---------- Appendix (always visible, post-footer) ---------- */
  /* v0.6 (EM-32): appendix is no longer a <details> collapse.
     Renders as a normal section below the footer for deep readers. */
  .appendix {
    margin: 4rem 0 0;
    padding-top: 3rem;
    border-top: 1px solid var(--border);
  }
  .appendix-title {
    color: var(--text-dim);
    font-weight: 700;
    margin-bottom: 0.4rem;
  }
  .appendix-subtitle {
    color: var(--text-mute);
    font-size: 0.92rem;
    margin: 0 0 1.75rem;
  }
  .appendix-body {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem 1.75rem 2rem;
  }
  .appendix-body h3 {
    font-size: 1.1rem;
    font-weight: 700;
    margin: 1.5rem 0 0.85rem;
    color: var(--text);
  }
  .appendix-body h3:first-child { margin-top: 0; }
  .appendix-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.5rem 0;
    font-size: 0.92rem;
  }
  .appendix-body th, .appendix-body td {
    text-align: left;
    padding: 0.6rem 0.85rem;
    border-bottom: 1px solid var(--border);
  }
  .appendix-body th {
    color: var(--text-mute);
    font-weight: 600;
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .appendix-body td { color: var(--text-dim); }
  .appendix-body .dimension {
    margin: 1.25rem 0;
    padding: 1rem 1.2rem;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .appendix-body .dimension-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.85rem;
  }
  .appendix-body .dimension-header h4 {
    font-size: 1rem;
    font-weight: 700;
    margin: 0;
  }
  .appendix-body .score-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--accent-brass);
    padding: 0.25rem 0.6rem;
    border-radius: 6px;
    background: rgba(212,175,120,0.08);
    border: 1px solid rgba(212,175,120,0.2);
  }
  .appendix-body .finding {
    margin: 0.6rem 0;
    font-size: 0.92rem;
    color: var(--text-dim);
    line-height: 1.55;
  }
  .appendix-body .finding .tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    margin-right: 0.5rem;
    vertical-align: middle;
  }
  .appendix-body .finding .tag-critical { background: rgba(251,113,133,0.15); color: var(--accent-rose); }
  .appendix-body .finding .tag-high { background: rgba(251,191,36,0.15); color: var(--accent-amber); }
  .appendix-body .finding .tag-medium { background: rgba(34,211,238,0.12); color: var(--accent-cyan); }
  .appendix-body .finding .tag-low { background: rgba(255,255,255,0.06); color: var(--text-mute); }
  .appendix-body .finding strong { color: var(--text); }
  .appendix-body .finding .recommendation {
    display: block;
    margin-top: 0.3rem;
    padding-left: 1rem;
    border-left: 2px solid var(--border);
    color: var(--text-dim);
  }

  /* ---------- Footer ---------- */
  #signoff {
    margin-top: 5rem;
    padding-top: 4rem;
    border-top: 1px solid var(--border);
  }
  #signoff .eyebrow {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-mute);
    margin-bottom: 1rem;
  }
  #signoff h2 {
    font-size: clamp(1.75rem, 3.5vw, 2.5rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    margin: 0 0 1.25rem;
  }
  #signoff .close-lede {
    font-size: 1.05rem;
    line-height: 1.6;
    color: var(--text-dim);
    max-width: 720px;
    margin: 0 0 1rem;
  }
  #signoff .close-lede strong { color: var(--text); }
  #signoff .sign-off {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }
  #signoff .sig-name { font-weight: 700; color: var(--text); margin-bottom: 0.3rem; }
  #signoff .sig-sub { color: var(--text-mute); font-size: 0.9rem; }
  #signoff a { color: var(--accent-cyan); text-decoration: none; }
  #signoff a:hover { text-decoration: underline; }

  /* Override #signoff a cascade for CTA buttons in the footer — without this,
     the .cta.primary text is the same cyan as the button background and reads
     as a blank cyan blob. v0.8 EM-50 contrast fix needs this companion rule. */
  #signoff a.cta.primary,
  .cta.primary,
  .cta.primary:visited,
  .cta.primary:link {
    color: #000 !important;
  }
  #signoff a.cta.primary:hover,
  .cta.primary:hover {
    color: #000 !important;
  }
  .cta.primary .icon { stroke: #000; }
  #signoff a.cta.ghost { color: var(--text); }
  #signoff a.cta.ghost:hover { color: var(--accent-cyan); }

  /* ---------- Reveal animation ---------- */
  .reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal.delay-1 { transition-delay: 0.08s; }
  .reveal.delay-2 { transition-delay: 0.16s; }
  .reveal.delay-3 { transition-delay: 0.24s; }
  .reveal.delay-4 { transition-delay: 0.32s; }
  .reveal.delay-5 { transition-delay: 0.4s; }
</style>
</head>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
